<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recetario Julia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins,system-ui;
margin:0;
background:linear-gradient(135deg,#fff8f5,#ffe9e2);
color:#333;
}

/* HERO */

.hero{
text-align:center;
padding:90px 20px 60px 20px;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
letter-spacing:-0.5px;
}

.hero p{
opacity:.7;
font-size:18px;
}

/* SEARCH */

.search{
max-width:520px;
margin:35px auto;
}

.search input{
width:100%;
padding:16px 18px;
border-radius:14px;
border:none;
font-size:16px;

box-shadow:
0 6px 16px rgba(0,0,0,.08),
0 12px 35px rgba(0,0,0,.05);
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* LEVEL */

.level{
margin-bottom:70px;
}

.level h2{
margin-bottom:25px;
letter-spacing:1px;
font-size:24px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:24px;
}

/* CARD */

.card{

background:white;

padding:24px;

border-radius:20px;

box-shadow:
0 6px 14px rgba(0,0,0,.06),
0 14px 35px rgba(0,0,0,.08);

cursor:pointer;

transition:all .25s ease;

position:relative;

overflow:hidden;

}

/* glow effect */

.card::before{

content:"";

position:absolute;

top:-40%;
left:-40%;

width:180%;
height:180%;

background:radial-gradient(circle at center, rgba(255,200,180,.25), transparent 60%);

opacity:0;

transition:.4s;

}

.card:hover::before{
opacity:1;
}

.card:hover{

transform:translateY(-6px) scale(1.02);

box-shadow:
0 12px 28px rgba(0,0,0,.12),
0 25px 60px rgba(0,0,0,.15);

}

.card:active{
transform:scale(.97);
}

/* ICON */

.icon{
font-size:32px;
margin-bottom:10px;
}

/* LESSON */

.lesson{
font-size:13px;
opacity:.6;
margin-bottom:6px;
font-style:italic;
}

/* TITLE */

.title{
font-weight:600;
font-size:17px;
letter-spacing:.2px;
}

/* FOOTER */

.footer{
text-align:center;
padding:40px;
opacity:.6;
font-size:14px;
}

</style>

</head>

<body>

<div class="hero">

<h1>Recetario Julia 🍰</h1>

<p>Escuela de Pastelería</p>

<div class="search">

<input id="search" placeholder="Buscar receta (ej. Maracuyá, Ópera, Tiramisú)">

</div>

</div>

<div class="container" id="content"></div>

<div class="footer">

Hecho con mantequilla, azúcar y cariño.

const container=document.getElementById("content")

for(let level in data){

let section=document.createElement("div")
section.className="level"

let title=document.createElement("h2")
title.textContent=level

let grid=document.createElement("div")
grid.className="grid"

data[level].forEach((item,index)=>{

let card=document.createElement("div")
card.className="card"

card.dataset.title=item[1].toLowerCase()

card.onclick=()=>{
window.location.href = item[2]
}

card.innerHTML=`
<div class="icon">${item[0]}</div>
<div class="lesson">Clase ${index+1}</div>
<div class="title">${item[1]}</div>
`

grid.appendChild(card)

})

section.appendChild(title)
section.appendChild(grid)

container.appendChild(section)

}

document.getElementById("search").addEventListener("input",function(){

let q=this.value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

if(card.dataset.title.includes(q)){
card.style.display="block"
}else{
card.style.display="none"
}

})

})
